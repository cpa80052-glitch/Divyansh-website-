
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="refresh" content="4;url=/home">
<style>

body{
background:#000;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
color:white;
font-family:sans-serif;
overflow:hidden;
}

.logo{
width:300px;
animation: zoom 2s ease-in-out infinite alternate;
}

@keyframes zoom{
from{transform:scale(1)}
to{transform:scale(1.15)}
}

.loader{
margin-top:40px;
width:200px;
height:6px;
background:#333;
border-radius:10px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:red;
animation:load 4s linear forwards;
}

@keyframes load{
from{width:0}
to{width:100%}
}

.text{
margin-top:20px;
opacity:0.8;
font-size:18px;
letter-spacing:2px;
}

</style>
</head>
<body>

<img src="/static/logo.png" class="logo">

<div class="text">Created By Divyansh</div>

<div class="loader">
<div class="bar"></div>
</div>

<div style="margin-top:15px;font-size:14px;opacity:0.7;">
Loading next page...
</div>

</body>
</html>
